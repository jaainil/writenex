name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org"

            - run: pnpm install --frozen-lockfile

            - run: pnpm build:astro

            - name: Bump version
              id: version
              run: |
                  VERSION=$(node -e "const pkg=require('./packages/astro/package.json'); const v=pkg.version.split('.').map(Number); v[2]++; console.log('v'+v.join('.'))")
                  echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
                  npm version $VERSION --no-git-tag-version --allow-same-version --workspace=@imjp/writenex-astro

            - name: Publish to npm
              run: npm publish --access public --workspace=@imjp/writenex-astro

            - name: Create GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  tagName: ${{ steps.version.outputs.VERSION }}
                  generateReleaseNotes: true
                  token: ${{ secrets.GITHUB_TOKEN }}
